<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      #scanning-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.8);
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        color: white; font-family: sans-serif; z-index: 99; text-align: center;
      }
      #scanning-overlay.hidden { display: none !important; }
      #ui-container {
        position: fixed; bottom: 20px; left: 50%;
        transform: translateX(-50%); z-index: 100;
        display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; width: 90%;
      }
      .btn {
        background: rgba(0, 0, 0, 0.7); color: white; border: 2px solid white;
        padding: 12px 18px; border-radius: 30px; font-family: sans-serif;
        font-weight: bold; cursor: pointer; font-size: 14px;
      }
    </style>

    <script>
      // --- MULTI-TARGET CONFIGURATION ---
      const SCENE_CONFIG = {
        mindFile: './targets.mind', // Path to your compiled .mind file
      };

      const TARGETS = [
        {
          name: "Combine Harvester",
          modelSrc: "combine.glb",
          scale: "1 1 1",
          pos: "0 0.1 0"
        },
        {
          name: "Tractor",
          modelSrc: "tractor.glb",
          scale: "0.5 0.5 0.5",
          pos: "0 0.2 0"
        },
        {
          name: "Barn",
          modelSrc: "barn.glb",
          scale: "1.5 1.5 1.5",
          pos: "0 0 0"
        }
      ];
      // ----------------------------------

      AFRAME.registerComponent('drag-rotate', {
        schema: { speed: {default: 2} },
        init: function() {
          this.ifMouseDown = false; this.x_cord = 0;
          const handleStart = (x) => { this.ifMouseDown = true; this.x_cord = x; };
          const handleEnd = () => { this.ifMouseDown = false; };
          const handleMove = (x) => {
            if(this.ifMouseDown) {
              let temp_x = x - this.x_cord;
              this.el.object3D.rotateY(temp_x * (this.data.speed / 1000));
              this.x_cord = x;
            }
          };
          document.addEventListener('mousedown', (e) => handleStart(e.clientX));
          document.addEventListener('touchstart', (e) => handleStart(e.touches[0].clientX));
          document.addEventListener('mouseup', handleEnd);
          document.addEventListener('touchend', handleEnd);
          document.addEventListener('mousemove', (e) => handleMove(e.clientX));
          document.addEventListener('touchmove', (e) => handleMove(e.touches[0].clientX));
        }
      });
    </script>
  </head>
  <body>

    <div id="scanning-overlay">
      <p id="scanning-text">Scanning for targets...</p>
    </div>

    <div id="ui-container">
      <button class="btn" onclick="adjustZoom(-0.2)">Zoom -</button>
      <button class="btn" id="toggleMode">Switch Vertical</button>
      <button class="btn" onclick="adjustZoom(0.2)">Zoom +</button>
    </div>

    <a-scene id="ar-scene"
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights: true" 
      vr-mode-ui="enabled: false">
      
      <a-assets id="asset-container"></a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity light="type: hemisphere; intensity: 2.5"></a-entity>
      <a-entity light="type: directional; intensity: 1.5" position="-1 2 1"></a-entity>

      <div id="target-anchor"></div>
      
    </a-scene>

    <script>
      const sceneEl = document.querySelector('#ar-scene');
      const assetContainer = document.querySelector('#asset-container');
      const targetAnchor = document.querySelector('#target-anchor');
      const overlay = document.querySelector('#scanning-overlay');
      const scanText = document.querySelector('#scanning-text');
      const toggleBtn = document.querySelector('#toggleMode');

      let isVertical = false;

      // 1. Initialize Scene & Load Targets
      sceneEl.setAttribute('mindar-image', `imageTargetSrc: ${SCENE_CONFIG.mindFile}; uiScanning: #scanning-overlay;`);
      
      let names = TARGETS.map(t => t.name).join(", ");
      scanText.innerText = `Point camera at: \n ${names}`;

      TARGETS.forEach((config, index) => {
        // Create Asset
        const asset = document.createElement('a-asset-item');
        asset.setAttribute('id', `model-${index}`);
        asset.setAttribute('src', config.modelSrc);
        assetContainer.appendChild(asset);

        // Create Entity
        const entity = document.createElement('a-entity');
        entity.setAttribute('mindar-image-target', `targetIndex: ${index}`);
        
        const model = document.createElement('a-gltf-model');
        model.setAttribute('id', `active-model-${index}`);
        model.setAttribute('src', `#model-${index}`);
        model.setAttribute('rotation', '90 0 0');
        model.setAttribute('position', config.pos);
        model.setAttribute('scale', config.scale);
        model.setAttribute('drag-rotate', '');
        model.setAttribute('animation-mixer', '');
        
        // Material Fix
        model.addEventListener('model-loaded', () => {
          model.getObject3D('mesh').traverse(n => { if(n.isMesh) { n.material.metalness = 0; n.material.roughness = 1; }});
        });

        entity.appendChild(model);
        targetAnchor.appendChild(entity);

        // Visibility UI Logic
        entity.addEventListener("targetFound", () => { overlay.classList.add("hidden"); });
        entity.addEventListener("targetLost", () => { overlay.classList.remove("hidden"); });
      });

      // Global Controls
      window.adjustZoom = (amount) => {
        document.querySelectorAll('a-gltf-model').forEach(model => {
          let s = model.getAttribute('scale');
          model.setAttribute('scale', `${s.x + amount} ${s.y + amount} ${s.z + amount}`);
        });
      };

      toggleBtn.addEventListener('click', () => {
        isVertical = !isVertical;
        document.querySelectorAll('a-gltf-model').forEach(model => {
          model.setAttribute('rotation', isVertical ? '0 0 0' : '90 0 0');
        });
        toggleBtn.innerText = isVertical ? "Switch Flat" : "Switch Vertical";
      });
    </script>
  </body>
</html>
