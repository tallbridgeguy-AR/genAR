<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    
    <script>
      // ==========================================
      // CONFIGURATION: CHANGE YOUR FILES HERE
      // ==========================================
      const CONFIG = {
        mindFile: "farm.mind",    // Your compiled MindAR target file
        modelFile: "combine.glb", // Your 3D model file
        targetName: "farm"        // Used in scanning text and file naming
      };
      // ==========================================

      // DRAG ROTATE COMPONENT
      AFRAME.registerComponent('drag-rotate', {
        schema: { speed: {default: 2} },
        init: function() {
          this.ifMouseDown = false;
          this.x_cord = 0;
          const handleStart = (x) => { this.ifMouseDown = true; this.x_cord = x; };
          const handleEnd = () => { this.ifMouseDown = false; };
          const handleMove = (x) => {
            if(this.ifMouseDown) {
              let temp_x = x - this.x_cord;
              this.el.object3D.rotateY(temp_x * (this.data.speed / 1000));
              this.x_cord = x;
            }
          };
          document.addEventListener('mousedown', (e) => handleStart(e.clientX));
          document.addEventListener('touchstart', (e) => handleStart(e.touches[0].clientX));
          document.addEventListener('mouseup', handleEnd);
          document.addEventListener('touchend', handleEnd);
          document.addEventListener('mousemove', (e) => handleMove(e.clientX));
          document.addEventListener('touchmove', (e) => handleMove(e.touches[0].clientX));
        }
      });
    </script>

    <style>
      body { margin: 0; overflow: hidden; }
      
      /* THE SCANNING SCREEN */
      #scanning-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.8);
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        color: white; font-family: sans-serif; z-index: 99;
      }
      #scanning-overlay.hidden { display: none !important; }

      /* THE UI BUTTONS */
      #ui-container {
        position: fixed; bottom: 20px; left: 50%;
        transform: translateX(-50%); z-index: 100;
        display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
        width: 90%;
      }
      .btn {
        background: rgba(0, 0, 0, 0.7); color: white; border: 2px solid white;
        padding: 12px 18px; border-radius: 30px; font-family: sans-serif;
        font-weight: bold; cursor: pointer; -webkit-tap-highlight-color: transparent;
        font-size: 14px;
      }
      .btn:active { background: white; color: black; }
      #screenshotBtn { background: #27ae60; border-color: #2ecc71; }

      /* FLASH EFFECT */
      .flash {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: white; z-index: 1000; opacity: 0; pointer-events: none;
      }
      .flash.active { animation: flash-anim 0.3s ease-out; }
      @keyframes flash-anim { 
        0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } 
      }
    </style>
  </head>
  <body>

    <div id="flash-overlay" class="flash"></div>

    <div id="scanning-overlay">
      <p id="scanning-text">Point camera at the image...</p>
    </div>

    <div id="ui-container">
      <button class="btn" id="zoomOut">Zoom -</button>
      <button class="btn" id="resetBtn">Reset</button>
      <button class="btn" id="screenshotBtn">📸 Photo</button>
      <button class="btn" id="toggleMode">Switch to Vertical</button>
      <button class="btn" id="zoomIn">Zoom +</button>
    </div>

    <a-scene 
      id="mainScene"
      color-space="sRGB" 
      renderer="colorManagement: true; physicallyCorrectLights: true; preserveDrawingBuffer: true;" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="arModelAsset"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity light="type: hemisphere; intensity: 3"></a-entity>
      <a-entity light="type: directional; intensity: 2" position="-1 2 1"></a-entity>

      <a-entity id="target" mindar-image-target="targetIndex: 0">
        <a-gltf-model 
          id="arModel"
          src="#arModelAsset" 
          rotation="90 0 0" 
          position="0 0.1 0" 
          scale="1.0 1.0 1.0"
          animation-mixer
          drag-rotate> 
        </a-gltf-model>
      </a-entity>
    </a-scene>

    <script>
      // 1. Initialize Scene based on Config
      const sceneEl = document.querySelector('#mainScene');
      const modelAsset = document.querySelector('#arModelAsset');
      const scanningText = document.querySelector('#scanning-text');

      sceneEl.setAttribute('mindar-image', `imageTargetSrc: ./${CONFIG.mindFile}; uiScanning: #scanning-overlay; filterMinCF: 0.0001; filterBeta: 0.001;`);
      modelAsset.setAttribute('src', CONFIG.modelFile);
      scanningText.innerText = `Point camera at the ${CONFIG.targetName} image...`;

      // 2. Element Selectors
      const targetEl = document.querySelector('#target');
      const overlay = document.querySelector('#scanning-overlay');
      const arModel = document.querySelector('#arModel');
      const flash = document.querySelector('#flash-overlay');
      
      const toggleBtn = document.querySelector('#toggleMode');
      const resetBtn = document.querySelector('#resetBtn');
      const zoomInBtn = document.querySelector('#zoomIn');
      const zoomOutBtn = document.querySelector('#zoomOut');
      const screenshotBtn = document.querySelector('#screenshotBtn');

      // 3. AR Event Handlers
      targetEl.addEventListener("targetFound", () => { overlay.classList.add("hidden"); });
      targetEl.addEventListener("targetLost", () => { overlay.classList.remove("hidden"); });

      // 4. Transform Logic
      let isVertical = false;
      let currentScale = 1.0;
      const zoomStep = 0.2;

      toggleBtn.addEventListener('click', () => {
        isVertical = !isVertical;
        if (isVertical) {
          arModel.setAttribute('rotation', '0 0 0');
          arModel.setAttribute('position', '0 0.1 0'); 
          toggleBtn.innerText = "Switch to Flat";
        } else {
          arModel.setAttribute('rotation', '90 0 0');
          arModel.setAttribute('position', '0 0.5 0');
          toggleBtn.innerText = "Switch to Vertical";
        }
      });

      zoomInBtn.addEventListener('click', () => {
        currentScale += zoomStep;
        arModel.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
      });

      zoomOutBtn.addEventListener('click', () => {
        currentScale = Math.max(0.2, currentScale - zoomStep);
        arModel.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
      });

      resetBtn.addEventListener('click', () => {
        currentScale = 1.0;
        arModel.setAttribute('scale', '1 1 1');
        arModel.setAttribute('rotation', isVertical ? '0 0 0' : '90 0 0');
      });

      // 5. Screenshot Logic
      screenshotBtn.addEventListener('click', () => {
        // Trigger Flash
        flash.classList.add('active');
        setTimeout(() => flash.classList.remove('active'), 300);

        const video = document.querySelector('video');
        const canvas = document.createElement('canvas');
        const context = canvas.getContext('2d');
        
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        // Draw camera feed
        context.drawImage(video, 0, 0, canvas.width, canvas.height);

        // Draw 3D scene
        const sceneCanvas = sceneEl.renderer.domElement;
        context.drawImage(sceneCanvas, 0, 0, canvas.width, canvas.height);

        // Download
        const dataURL = canvas.toDataURL('image/png');
        const link = document.createElement('a');
        link.download = `AR-Photo-${CONFIG.targetName}.png`;
        link.href = dataURL;
        link.click();
      });

      // 6. Material Adjustment
      arModel.addEventListener('model-loaded', () => {
        const mesh = arModel.getObject3D('mesh');
        mesh.traverse((node) => {
          if (node.isMesh) {
            node.material.metalness = 0;
            node.material.roughness = 1;
            node.material.transparent = false;
          }
        });
      });
    </script>
  </body>
</html>
